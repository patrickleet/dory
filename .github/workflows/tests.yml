name: Tests

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@c915c33a16f01166c17c4e35fe1d4085a2d71adb # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - name: Install Protocol Buffers compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: scripts/test.sh rust

  macos:
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@c915c33a16f01166c17c4e35fe1d4085a2d71adb # v4
      - name: Select Xcode
        run: |
          newest="$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          echo "DEVELOPER_DIR=$newest/Contents/Developer" >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install Protocol Buffers compiler
        run: brew install protobuf
      - name: Swift packages
        run: scripts/test.sh swift
      - name: App tests
        run: scripts/test.sh app
      - name: UI tests
        run: scripts/test.sh ui
