name: Benchmark

# Cross-engine benchmark: Dory's shared VM against incumbent macOS container runtimes.
#
# IMPORTANT: this needs real Mac hardware with hardware virtualization. GitHub-HOSTED macOS runners
# are themselves VMs without nested virtualization, so they CANNOT run the container engine. This
# job produces Dory/Docker/OrbStack numbers only on a SELF-HOSTED Mac with the target engines
# installed. Apple's separate `container` CLI can still be added explicitly as a competitor on
# macOS 26+ runners, but it is not part of the default 0.3 local-release benchmark.
# Label such a runner `[self-hosted, macOS, dory]`; add `intel` to the runner labels for the Intel
# track.

on:
  workflow_dispatch:
    inputs:
      engines:
        description: 'Comma-separated engines: dory,orbstack,docker-desktop (optionally apple-container)'
        default: 'dory,orbstack,docker-desktop'
      metrics:
        description: 'Comma-separated metrics: memory,cpu,network,fs'
        default: 'memory,cpu,network,fs'
      dory_app:
        description: 'Optional released Dory.app path to launch/record, e.g. /Applications/Dory.app'
        default: ''
      memory_count:
        description: 'Number of idle containers for memory metric'
        default: '3'
      memory_counts:
        description: 'Optional comma-separated idle-container sweep, e.g. 0,1,3,5,10'
        default: ''
      runs:
        description: 'Repetitions per timed metric'
        default: '3'
      cpu_mb:
        description: 'MiB streamed through sha256sum for the CPU metric'
        default: '256'
      fs_files:
        description: 'Small files for the filesystem metric'
        default: '2000'
  schedule:
    - cron: '0 9 * * 1'  # weekly, Monday 09:00 UTC

jobs:
  benchmark:
    runs-on: [self-hosted, macOS, dory]
    steps:
      - uses: actions/checkout@c915c33a16f01166c17c4e35fe1d4085a2d71adb # v4
      - name: Run cross-engine benchmark
        env:
          BENCH_WORKDIR: ${{ runner.temp }}/dory-benchmark
          DORY_BENCH_APP_INPUT: ${{ github.event.inputs.dory_app || '' }}
        run: |
          args=( \
            --engines "${{ github.event.inputs.engines || 'dory,orbstack,docker-desktop' }}" \
            --metrics "${{ github.event.inputs.metrics || 'memory,cpu,network,fs' }}" \
            --memory-count "${{ github.event.inputs.memory_count || '3' }}" \
            --runs "${{ github.event.inputs.runs || '3' }}" \
            --cpu-mb "${{ github.event.inputs.cpu_mb || '256' }}" \
            --fs-files "${{ github.event.inputs.fs_files || '2000' }}" \
          )
          if [ -n "${{ github.event.inputs.memory_counts || '' }}" ]; then
            args+=(--memory-counts "${{ github.event.inputs.memory_counts }}")
          fi
          if [ -n "$DORY_BENCH_APP_INPUT" ]; then
            args+=(--dory-app "$DORY_BENCH_APP_INPUT")
          fi
          scripts/benchmark-compare.sh "${args[@]}"
          result_dir="$(find "$BENCH_WORKDIR" -mindepth 1 -maxdepth 1 -type d | sort | tail -1)"
          test -n "$result_dir"
          echo "BENCH_RESULT_DIR=$result_dir" >> "$GITHUB_ENV"
      - name: Summarize
        run: |
          {
            echo "### Dory cross-engine benchmark"
            echo ""
            echo "Raw result directory: \`$BENCH_RESULT_DIR\`"
            echo ""
            echo "#### Machine"
            echo '```tsv'
            cat "$BENCH_RESULT_DIR/machine-spec.tsv"
            echo '```'
            echo ""
            echo "#### Status"
            echo '```tsv'
            cat "$BENCH_RESULT_DIR/status.tsv"
            echo '```'
            echo ""
            echo "#### Engine versions"
            echo '```tsv'
            cat "$BENCH_RESULT_DIR/engine-versions.tsv"
            echo '```'
            echo ""
            echo "#### Generated summary"
            cat "$BENCH_RESULT_DIR/summary.md"
            echo ""
            echo "#### Summary JSON"
            echo '```json'
            cat "$BENCH_RESULT_DIR/summary.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: ${{ runner.temp }}/dory-benchmark
