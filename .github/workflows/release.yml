name: Release

# Builds, signs, notarizes, and publishes a Dory release when a version tag (e.g. v0.1.0) is
# pushed, or on manual dispatch.
#
# Required repository secrets:
#   DEVELOPER_ID_CERT_P12_BASE64  base64 of your "Developer ID Application" .p12
#   DEVELOPER_ID_CERT_PASSWORD    the .p12 export password
#   KEYCHAIN_PASSWORD             any string — used for the throwaway CI keychain
#   NOTARY_APPLE_ID              Apple ID email for notarytool
#   NOTARY_TEAM_ID               Apple Developer Team ID
#   NOTARY_APPLE_PASSWORD        app-specific password for that Apple ID
#
# NOTE: Dory targets macOS 26 (Tahoe) and needs Xcode 27. GitHub-hosted runners do not offer that
# toolchain yet, so point `runs-on` at a self-hosted macOS 26 runner (label it `[self-hosted, macOS]`
# and update below). `macos-15` keeps the workflow valid out of the box but will fail to compile
# until hosted runners catch up.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    # Builds on a recent macOS image (macOS 26 Tahoe or newer). Override the runner by setting the
    # repo variable RELEASE_RUNNER (e.g. macos-26 or a self-hosted label) — Settings → Variables.
    runs-on: ${{ vars.RELEASE_RUNNER || 'macos-latest' }}
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha256: ${{ steps.build.outputs.sha256 }}
      build: ${{ steps.build.outputs.build }}
      dmg: ${{ steps.build.outputs.dmg }}
      edsig: ${{ steps.sparkle.outputs.edsig }}
      length: ${{ steps.sparkle.outputs.length }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Select newest installed Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Ensure Metal toolchain (SwiftTerm ships Metal shaders)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/dory-signing.keychain-db"
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, and notarize
        id: build
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          # Team ID is not secret (it appears in every signed app); fall back to the project's team.
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID || '864H636QW4' }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_APPLE_PASSWORD }}
          # Self-contained build (bundles the in-process engine: dory-vm + kernel + initfs). Only works
          # on a runner that has run Apple's `container` (the kernel/initfs assets) — i.e. a self-hosted
          # macOS 26 runner, NOT hosted CI (no virtualization). Set repo variable BUNDLE_ENGINE=1 there.
          DORY_BUNDLE_ENGINE: ${{ vars.BUNDLE_ENGINE || '0' }}
        run: scripts/release.sh "${{ steps.ver.outputs.version }}" "${{ github.run_number }}"

      # Sign the zip with the Sparkle EdDSA key so the appcast entry verifies. Needs a
      # SPARKLE_PRIVATE_KEY secret (export it once with Sparkle's generate_keys -x); skipped if absent.
      - name: Sign update for Sparkle
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then echo "SPARKLE_PRIVATE_KEY not set — skipping update signing"; exit 0; fi
          curl -fsSL https://github.com/sparkle-project/Sparkle/releases/download/2.9.3/Sparkle-2.9.3.tar.xz -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle && tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          OUT=$(/tmp/sparkle/bin/sign_update -s "$SPARKLE_PRIVATE_KEY" "${{ steps.build.outputs.zip }}")
          echo "edsig=$(echo "$OUT" | sed -E 's/.*sparkle:edSignature="([^"]+)".*/\1/')" >> "$GITHUB_OUTPUT"
          echo "length=$(echo "$OUT" | sed -E 's/.*length="([^"]+)".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Dory ${{ steps.ver.outputs.version }}
          files: |
            ${{ steps.build.outputs.zip }}
            ${{ steps.build.outputs.dmg }}
          generate_release_notes: true
          body: |
            Native, lightweight Docker & Linux containers on Apple silicon — a free, open-source
            alternative to OrbStack and Docker Desktop. Requires macOS 26 (Tahoe) or later.

            **Install**

            ```sh
            brew install --cask Augani/dory/dory
            ```

            …or download `Dory-${{ steps.ver.outputs.version }}.dmg` below and drag Dory to Applications.

            ```
            zip sha256: ${{ steps.build.outputs.sha256 }}
            ```

  # Keeps the Homebrew cask in this repo (the tap) current after every release.
  bump-cask:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update cask + Sparkle appcast
        run: |
          V="${{ needs.release.outputs.version }}"
          S="${{ needs.release.outputs.sha256 }}"
          B="${{ needs.release.outputs.build }}"
          SIG="${{ needs.release.outputs.edsig }}"
          LEN="${{ needs.release.outputs.length }}"
          sed -i -E "s/  version \"[^\"]+\"/  version \"$V\"/" Casks/dory.rb
          sed -i -E "s/  sha256 \"[0-9a-f]+\"/  sha256 \"$S\"/" Casks/dory.rb
          if [ -n "$SIG" ]; then
            scripts/update-appcast.sh "$V" "${B:-1}" \
              "https://github.com/Augani/dory/releases/download/v$V/Dory-$V.zip" "$SIG" "$LEN"
          else
            echo "no Sparkle signature (SPARKLE_PRIVATE_KEY unset) — appcast left unchanged"
          fi
          git add Casks/dory.rb docs/appcast.xml
          if git diff --cached --quiet; then echo "nothing to update"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: release metadata for v$V (cask + appcast)"
          git push

      # Sync the same cask to the Augani/homebrew-dory tap so `brew install --cask Augani/dory/dory`
      # picks it up. Needs a HOMEBREW_TAP_TOKEN secret (a PAT with contents:write on homebrew-dory);
      # skipped if absent.
      - name: Sync cask to the homebrew-dory tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then echo "HOMEBREW_TAP_TOKEN not set — skipping tap sync"; exit 0; fi
          V="${{ needs.release.outputs.version }}"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/Augani/homebrew-dory.git" tap
          cp Casks/dory.rb tap/Casks/dory.rb
          cd tap
          if git diff --quiet; then echo "tap already current"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: update Dory cask to v$V"
          git push
