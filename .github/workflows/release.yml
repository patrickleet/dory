name: Release

# Builds, signs, notarizes, and publishes a Dory release when a version tag (e.g. v0.1.0) is
# pushed, or on manual dispatch.
#
# Required repository secrets:
#   DEVELOPER_ID_CERT_P12_BASE64  base64 of your "Developer ID Application" .p12
#   DEVELOPER_ID_CERT_PASSWORD    the .p12 export password
#   KEYCHAIN_PASSWORD             any string, used for the throwaway CI keychain
#   NOTARY_APPLE_ID              Apple ID email for notarytool
#   NOTARY_TEAM_ID               Apple Developer Team ID
#   NOTARY_APPLE_PASSWORD        app-specific password for that Apple ID
#
# NOTE: Dory targets macOS 15+ and releases as Apple-silicon, Intel, and universal downloads.
# Engine-bundled releases still need the guest assets present on the runner; set BUNDLE_ENGINE=1
# only on a runner that has built or fetched those assets.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    # Override the runner by setting the repo variable RELEASE_RUNNER to a hosted image or a
    # self-hosted label in Settings, Variables.
    runs-on: ${{ vars.RELEASE_RUNNER || 'macos-latest' }}
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha256: ${{ steps.build.outputs.sha256 }}
      dmg: ${{ steps.build.outputs.dmg }}
      zip: ${{ steps.build.outputs.zip }}
      zip_arm64: ${{ steps.build.outputs.zip_arm64 }}
      zip_x86_64: ${{ steps.build.outputs.zip_x86_64 }}
      zip_universal: ${{ steps.build.outputs.zip_universal }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Select newest installed Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Ensure Metal toolchain (SwiftTerm ships Metal shaders)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/dory-signing.keychain-db"
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, and notarize
        id: build
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          # Team ID is not secret (it appears in every signed app); fall back to the project's team.
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID || '864H636QW4' }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_APPLE_PASSWORD }}
          # Self-contained build (bundles helper binaries plus kernel/initfs assets). Hosted CI can
          # build the universal app; set BUNDLE_ENGINE=1 only on a runner with guest assets available.
          DORY_BUNDLE_ENGINE: ${{ vars.BUNDLE_ENGINE || '0' }}
          DORY_RELEASE_VARIANTS: ${{ vars.RELEASE_VARIANTS || 'arm64 x86_64 universal' }}
        run: scripts/release.sh "${{ steps.ver.outputs.version }}" "${{ github.run_number }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Dory ${{ steps.ver.outputs.version }}
          files: |
            ${{ steps.build.outputs.zip_arm64 }}
            ${{ steps.build.outputs.zip_x86_64 }}
            ${{ steps.build.outputs.zip_universal }}
            ${{ steps.build.outputs.zip }}
            ${{ steps.build.outputs.dmg_arm64 }}
            ${{ steps.build.outputs.dmg_x86_64 }}
            ${{ steps.build.outputs.dmg_universal }}
            ${{ steps.build.outputs.dmg }}
            ${{ steps.build.outputs.lite }}
            ${{ steps.build.outputs.runtime }}
          generate_release_notes: true
          body: |
            Native, lightweight Docker & Linux containers, a free, open-source alternative to
            OrbStack and Docker Desktop. Optimized downloads for Apple silicon and Intel, plus
            a universal build, macOS 15+.
            See the release notes and COMPATIBILITY.md for the current built-in engine tier on
            each Mac architecture.

            **Pick your Mac build**

            | Asset | What it is |
            |---|---|
            | `Dory-${{ steps.ver.outputs.version }}-arm64.dmg` / `.zip` | Full app optimized for Apple silicon |
            | `Dory-${{ steps.ver.outputs.version }}-x86_64.dmg` / `.zip` | Full app optimized for Intel Macs |
            | `Dory-${{ steps.ver.outputs.version }}-universal.dmg` / `.zip` | Full app that runs on both Apple silicon and Intel |
            | `Dory-${{ steps.ver.outputs.version }}.dmg` / `.zip` | Compatibility alias for the universal build |
            | `Dory-${{ steps.ver.outputs.version }}-lite.zip` | App only (~6 MB) — front an engine you already run (Colima, Docker Desktop, OrbStack, Rancher, Podman) via Settings → Engine Backend |
            | `dory-engine-${{ steps.ver.outputs.version }}-arm64.tar.gz` | Headless engine runtime, no GUI — `./dory-engine start`, then `docker context use dory-engine` |

            **Install**

            ```sh
            brew install --cask Augani/dory/dory
            ```

            …or download the matching `.dmg` below and drag Dory to Applications.

            ```
            universal zip sha256: ${{ steps.build.outputs.sha256 }}
            ```

  # Keeps the Homebrew cask in this repo (the tap) current after every release.
  bump-cask:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Bump cask to the released version
        run: |
          V="${{ needs.release.outputs.version }}"
          S="${{ needs.release.outputs.sha256 }}"
          sed -i -E "s/  version \"[^\"]+\"/  version \"$V\"/" Casks/dory.rb
          sed -i -E "s/  sha256 \"[0-9a-f]+\"/  sha256 \"$S\"/" Casks/dory.rb
          git add Casks/dory.rb
          if git diff --cached --quiet; then echo "cask already current"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump Homebrew cask to v$V"
          git push

      # Sync the same cask to the Augani/homebrew-dory tap so `brew install --cask Augani/dory/dory`
      # picks it up. Needs a HOMEBREW_TAP_TOKEN secret (a PAT with contents:write on homebrew-dory);
      # skipped if absent.
      - name: Sync cask to the homebrew-dory tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then echo "HOMEBREW_TAP_TOKEN not set, skipping tap sync"; exit 0; fi
          V="${{ needs.release.outputs.version }}"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/Augani/homebrew-dory.git" tap
          cp Casks/dory.rb tap/Casks/dory.rb
          cd tap
          if git diff --quiet; then echo "tap already current"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: update Dory cask to v$V"
          git push
